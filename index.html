<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EmonToto Dashboard - Update 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Gaya CSS tetap sama dengan versi Anda namun dengan sedikit pembersihan */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            padding: 28px 20px;
            min-height: 100vh;
        }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .header-card {
            background: linear-gradient(135deg, #c27013e8 40%, #faf602e3 100%);
            border: 3px solid #1e2a32;
            border-radius: 20px;
            padding: 20px 32px;
            margin-bottom: 32px;
            color: #1e2a32;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
        }
        .brand-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 18px; }
        .brand-row h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            background: rgba(39, 38, 38, 0.2);
            padding: 10px 18px;
            border-radius: 10px;
            border: 2px solid #1e2a32;
            color: #000;
        }
        .clock-panel {
            background: rgba(39, 38, 38, 0.8);
            color: #05fd11;
            padding: 10px 18px;
            border: 2px solid #1e2a32;
            border-radius: 15px;
            display: flex;
            font-size: 2.5rem;
            gap: 15px;
            align-items: center;
        }
        .two-col-grid { display: flex; flex-wrap: wrap; gap: 28px; }
        .input-panel, .result-panel {
            background: white;
            border: 3px solid #1e2a32;
            border-radius: 15px;
            padding: 26px;
            flex: 1;
            min-width: 350px;
        }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.85rem; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #1e2a32;
            border-radius: 10px;
            background: #f9f9f9;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #c27013e8 40%, #faf602e3 100%);
            color: rgb(12, 12, 12);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1e2a32;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .result-card { background: #fffcf0; padding: 20px; border-radius: 15px; border: 1px solid #ffd8a8; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; }
        .info-label { font-weight: bold; color: #444; }
        .copy-btn { width: 100%; background: linear-gradient(135deg, #c27013e8 40%, #faf602e3 100%); padding: 12px; border-radius: 10px; border: 2px solid #1e2a32; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .toast-msg { position: fixed; bottom: 20px; right: 20px; background: #1e2a32; color: #fff; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: 0.3s; }

                /* Efek Hover untuk Tombol Generate */
        .btn-primary:hover {
            transform: scale(1.03); /* Zoom sedikit */
            background: #50f802;
            filter: brightness(1.1); /* Lebih terang */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); /* Bayangan */
        }

        /* Efek Hover untuk Tombol Copy */
        .copy-btn:hover {
            transform: scale(1.03);
            background: #50f802; /* Warna kuning lebih terang saat hover */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Efek saat tombol ditekan (biar terasa seperti tombol asli) */
        .btn-primary:active, .copy-btn:active {
            transform: scale(0.97);
        }

        /* Tambahkan ini pada .btn-primary dan .copy-btn agar gerakannya halus */
        .btn-primary, .copy-btn {
            transition: all 0.3s ease !important;
        }
    </style>
</head>

<body>

    
<div class="dashboard-container">
    <div class="header-card">
        <div class="brand-row">
            <h1><i class="fas fa-chart-line"></i> EmonToto</h1>
            <div class="clock-panel">
                <div id="liveClockMain">00:00:00 WIB</div>
                <select id="hourDropdown" style="width: auto; background: #222; color: #05fd11; border: 1px solid #05fd11;"></select>
                <button id="applyHourBtn" style="padding: 5px 10px; cursor:pointer;">Set</button>
            </div>
        </div>
        <div style="margin-top: 10px; font-weight: bold;">
            <span id="headerDateDisplay">-- --- 2026</span> | <span id="headerTimeDisplay">--:-- WIB</span>
        </div>
    </div>

    <div class="two-col-grid">
        <div class="input-panel">
            <label>1. Tempel Data Validasi & Aktif</label>
            <textarea id="pasteValidasiAktif" rows="2" placeholder="Tempel baris data di sini..."></textarea>
            
            <div style="display: flex; gap: 10px; margin: 15px 0;">
                <div style="flex:1;">
                    <label>2. Tempel Data DEPOSIT</label>
                    <textarea id="pasteDeposit" rows="2" placeholder="Deposit Total: ..."></textarea>
                </div>
                <div style="flex:1;">
                    <label>3. Tempel Data WITHDRAW</label>
                    <textarea id="pasteWithdraw" rows="2" placeholder="Withdraw Total: ..."></textarea>
                </div>
            </div>

            <button class="btn-primary" id="generateAllBtn">GENERATE LAPORAN</button>

            <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group"><label>Validasi</label><input type="number" id="inputValidasi"></div>
                <div class="form-group"><label>Member Aktif</label><input type="number" id="inputMemberAktif"></div>
                <div class="form-group"><label>Jml Depo</label><input type="number" id="inputMemberDeposit"></div>
                <div class="form-group"><label>Nominal Depo</label><input type="text" id="inputNominalDeposit"></div>
                <div class="form-group"><label>Jml WD</label><input type="number" id="inputMemberWithdraw"></div>
                <div class="form-group"><label>Nominal WD</label><input type="text" id="inputNominalWithdraw"></div>
            </div>
        </div>

        <div class="result-panel">
            <h3>Hasil Laporan</h3>
            <div class="result-card" id="reportArea">
                <div class="info-row"><span class="info-label">Info:</span><span>EmonToto</span></div>
                <div class="info-row"><span class="info-label">Tanggal:</span><span id="resultDate">-</span></div>
                <div class="info-row"><span class="info-label">Pukul:</span><span id="resultTime">-</span></div>
                <div class="info-row"><span class="info-label">Total Validasi:</span><span id="resVal">0</span></div>
                <div class="info-row"><span class="info-label">Member Aktif:</span><span id="resAktif">0</span></div>
                <div class="info-row"><span class="info-label">Member Depo:</span><span id="resMemDep">0</span></div>
                <div class="info-row"><span class="info-label">Nominal Depo:</span><span id="resNomDep">Rp. 0,-</span></div>
                <div class="info-row"><span class="info-label">Member WD:</span><span id="resMemWD">0</span></div>
                <div class="info-row"><span class="info-label">Nominal WD:</span><span id="resNomWD">Rp. 0,-</span></div>
            </div>
            <button class="copy-btn" id="copyReportBtn"><i class="fas fa-copy"></i> Copy Laporan</button>
        </div>
    </div>
</div>

<div id="toastMessage" class="toast-msg">Berhasil</div>

<script>
    let currentHour = null;
    let useManualHour = false;

    // 1. Inisialisasi Dropdown Jam
    const hourDropdown = document.getElementById('hourDropdown');
    for (let i = 0; i < 24; i++) {
        let h = i.toString().padStart(2, '0');
        hourDropdown.innerHTML += `<option value="${i}">${h}</option>`;
    }

    function getWIBDate() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        return new Date(utc + (7 * 3600000));
    }

    function updateTimeDisplay() {
        const now = getWIBDate();
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const dateStr = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        
        document.getElementById('headerDateDisplay').innerText = dateStr;
        document.getElementById('resultDate').innerText = dateStr;

        const liveTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0') + " WIB";
        document.getElementById('liveClockMain').innerText = liveTime;

        const reportHour = (useManualHour && currentHour !== null) ? currentHour.toString().padStart(2, '0') + ":00 WIB" : now.getHours().toString().padStart(2, '0') + ":00 WIB";
        document.getElementById('headerTimeDisplay').innerText = reportHour;
        document.getElementById('resultTime').innerText = reportHour;
    }

    setInterval(updateTimeDisplay, 1000);

    // 2. Fungsi Ekstraksi (Pembersih Angka)
    function parseRupiahToNumber(str) {
    if (!str) return 0;
    
    // 1. Jika ada desimal murni seperti .00 di paling akhir, buang dulu desimalnya saja
    let cleanStr = str.toString().trim();
    if (cleanStr.endsWith('.00') || cleanStr.endsWith(',00')) {
        cleanStr = cleanStr.slice(0, -3);
    }
    
    // 2. Hapus semua karakter yang BUKAN angka (titik ribuan, koma, Rp, spasi)
    let finalNumber = cleanStr.replace(/\D/g, '');
    
    return parseInt(finalNumber, 10) || 0;
}
    function formatRupiahWithComma(amount) {
    if (!amount) return "Rp. 0,-";
    let formatted = Math.round(amount).toLocaleString('id-ID');
    return `Rp. ${formatted},-`;
}

    // 3. Logika Ekstraksi Data dari Paste
    function extractDepoWd(rawText, keyword) {
        if (!rawText.trim()) return null;
        const lines = rawText.split(/\r?\n/);
        const line = lines.find(l => l.toLowerCase().includes(keyword.toLowerCase()));
        if (!line) return null;

        let content = line.toLowerCase().split(keyword.toLowerCase())[1].trim();
        let parts = content.split(/\s+/).filter(p => p.trim().length > 0);

        if (parts.length >= 2) {
            let memberRaw = parts[parts.length - 1]; // Angka terakhir adalah member
            let nominalRaw = parts.slice(0, parts.length - 1).join(""); // Sisanya nominal
            return {
                nominal: parseRupiahToNumber(nominalRaw),
                member: parseInt(memberRaw.replace(/[^\d]/g, ''), 10) || 0
            };
        }
        return null;
    }

    // 4. Update Tampilan Hasil Laporan
    function updateResultPanel() {
    // 1. Ambil nilai dari input kotak (kiri)
    const v = document.getElementById('inputValidasi').value || "0";
    const a = document.getElementById('inputMemberAktif').value || "0";
    const md = document.getElementById('inputMemberDeposit').value || "0";
    const ndRaw = document.getElementById('inputNominalDeposit').value || "0";
    const mw = document.getElementById('inputMemberWithdraw').value || "0";
    const nwRaw = document.getElementById('inputNominalWithdraw').value || "0";

    // 2. Bersihkan nominal (agar format Rp-nya benar)
    const nd = parseRupiahToNumber(ndRaw);
    const nw = parseRupiahToNumber(nwRaw);

    // 3. Masukkan ke Panel Hasil (Kanan) - SESUAI GAMBAR KODE ANDA
    // Pastikan ID ini sama persis dengan yang ada di baris 133-138 gambar Anda
    document.getElementById('resVal').innerText = v;
    document.getElementById('resAktif').innerText = a;
    document.getElementById('resMemDep').innerText = md;
    document.getElementById('resNomDep').innerText = formatRupiahWithComma(nd);
    document.getElementById('resMemWD').innerText = mw;
    document.getElementById('resNomWD').innerText = formatRupiahWithComma(nw);
}

    // 5. Tombol Generate Utama
    document.getElementById('generateAllBtn').onclick = function() {
        const vText = document.getElementById('pasteValidasiAktif').value;
        const dText = document.getElementById('pasteDeposit').value;
        const wText = document.getElementById('pasteWithdraw').value;

        // Proses Validasi & Aktif
        if (vText) {
            let parts = vText.trim().split(/\s+/);
            if (parts.length >= 4) {
                document.getElementById('inputValidasi').value = parts[2] || 0;
                document.getElementById('inputMemberAktif').value = parts[3] || 0;
            }
        }

        // Proses Deposit
        if (dText) {
            const data = extractDepoWd(dText, "Deposit Total:");
            if (data) {
                document.getElementById('inputMemberDeposit').value = data.member;
                document.getElementById('inputNominalDeposit').value = data.nominal.toLocaleString('id-ID');
            }
        }

        // Proses Withdraw
        if (wText) {
            const data = extractDepoWd(wText, "Withdraw Total:");
            if (data) {
                document.getElementById('inputMemberWithdraw').value = data.member;
                document.getElementById('inputNominalWithdraw').value = data.nominal.toLocaleString('id-ID');
            }
        }

        updateResultPanel(); // Jalankan update tampilan
        showToast("✅ Laporan Berhasil Diperbarui!");
    };

    // Tombol Copy
    document.getElementById('copyReportBtn').onclick = function() {
    const date = document.getElementById('resultDate').innerText;
    const time = document.getElementById('resultTime').innerText;
    
    // Ambil data dari ID yang benar (singkat)
    const v = document.getElementById('resVal').innerText;
    const a = document.getElementById('resAktif').innerText;
    const md = document.getElementById('resMemDep').innerText;
    const nd = document.getElementById('resNomDep').innerText;
    const mw = document.getElementById('resMemWD').innerText;
    const nw = document.getElementById('resNomWD').innerText;

    const text = `Info : EmonToto\nTanggal : ${date}\nPukul : ${time}\n\nTotal Validasi : ${v}\nTotal Member Aktif / Deposit : ${a}\n\nTotal Member Yang Deposit : ${md}\nTotal Nominal Deposit : ${nd}\n\nTotal Member Yang Withdraw : ${mw}\nTotal Nominal Withdraw : ${nw}`;
    
    navigator.clipboard.writeText(text).then(() => {
        showToast("📋 Laporan Berhasil Disalin!");
    });
};

    // Kontrol Jam
    document.getElementById('applyHourBtn').onclick = function() {
        currentHour = document.getElementById('hourDropdown').value;
        useManualHour = true;
        updateTimeDisplay();
        showToast("Jam diset ke " + currentHour.padStart(2, '0') + ":00");
    };

    document.getElementById('resetRealBtn').onclick = function() {
        useManualHour = false;
        updateTimeDisplay();
        showToast("Waktu Real-time aktif");
    };

    function showToast(msg) {
        const t = document.getElementById('toastMessage');
        t.innerText = msg; t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2500);
    }

    // Jalankan update otomatis jika input diubah manual
    const fields = ['inputValidasi', 'inputMemberAktif', 'inputMemberDeposit', 'inputNominalDeposit', 'inputMemberWithdraw', 'inputNominalWithdraw'];
    fields.forEach(id => {
        document.getElementById(id).addEventListener('input', updateResultPanel);
    });
</script>

</body>
</html>
